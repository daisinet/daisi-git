name: Deploy DaisiGit Worker

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - runtime: minimal
            dockerfile: Dockerfile
          - runtime: dotnet
            dockerfile: Dockerfile.dotnet
          - runtime: node
            dockerfile: Dockerfile.node
          - runtime: python
            dockerfile: Dockerfile.python
          - runtime: full
            dockerfile: Dockerfile.full

    steps:
      - name: Checkout daisi-git
        uses: actions/checkout@v4
        with:
          path: daisi-git

      - name: Checkout daisi-sdk-dotnet
        uses: actions/checkout@v4
        with:
          repository: daisinet/daisi-sdk-dotnet
          token: ${{ secrets.SDK_PAT }}
          path: daisi-sdk-dotnet

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push ${{ matrix.runtime }} image
        run: |
          docker build \
            -f daisi-git/DaisiGit.Worker/${{ matrix.dockerfile }} \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/daisigit-worker-${{ matrix.runtime }}:${{ github.sha }} \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/daisigit-worker-${{ matrix.runtime }}:latest \
            .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/daisigit-worker-${{ matrix.runtime }}:${{ github.sha }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/daisigit-worker-${{ matrix.runtime }}:latest
